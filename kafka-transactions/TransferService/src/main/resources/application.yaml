server:
  port: 0

spring:
  application:
    name: TransferService

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    name: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        delivery.timeout.ms: 120000
        linger.ms: 0
        request.timeout.ms: 30000
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
      transaction-id-prefix: transfer-service-${random.value}-

withdraw-money-topic: withdraw-money-topic
deposit-money-topic: deposit-money-topic

logging.level.org:
  springframework:
    transaction: DEBUG
    kafka.transaction: DEBUG
    orm.jpa.JpaTransactionManager: DEBUG
  apache.kafka.clients.producer.internals.TransactionManager: DEBUG

