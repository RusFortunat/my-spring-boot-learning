spring:
  application:
    name: demoAOP
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    name: postgres
    url: jdbc:postgresql://localhost:5432/postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
