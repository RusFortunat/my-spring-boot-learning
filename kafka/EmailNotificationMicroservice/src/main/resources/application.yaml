server:
  port: 0

spring:
  application:
    name: EmailNotificationMicroservice

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    name: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092, localhost:9094, localhost:9096
    consumer:
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: product-created-events
      properties:
        spring.json.trusted.packages: "com.appsdeveloperblog.ws.core"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.appsdeveloperblog.ws.core.ProductCreatedEvent

