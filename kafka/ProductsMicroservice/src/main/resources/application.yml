# starts application on a random portserver:  port: 0spring:  application:    name: ProductsMicroservice  datasource:    url: jdbc:postgresql://localhost:5432/postgres    username: postgres    name: postgres    password: postgres    driver-class-name: org.postgresql.Driver  jpa:    hibernate:      ddl-auto: update   # create | create-drop | update | validate | none    show-sql: true    properties:      hibernate:        format_sql: true      database-platform: org.hibernate.dialect.PostgreSQLDialect  kafka:    producer:      bootstrap-servers: localhost:9092,localhost:9094, localhost:9096      key-serializer: org.apache.kafka.common.serialization.StringSerializer      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer      acks: all # strongest durability guarantie      properties:        spring.json.add.type.headers: false        delivery.timeout.ms: 120000        linger.ms: 0        request.timeout.ms: 30000        enable.idempotence: truekafka:  topic:    name: product-created-events-topic    partitions: 3    replicas: 3    min-insync-replicas: 2